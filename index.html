<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nambar 1 - Safe Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --main: #00d2d3; --bg: #0a0e12; --card: #161d24; --text: #ffffff; --danger: #ff4757; --success: #05c46b; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 3px solid var(--main); }
        .stats-bar { background: #1e272e; padding: 12px; text-align: center; color: var(--main); display: flex; justify-content: space-around; font-size: 13px; font-weight: bold; }
        
        /* صندوق الأرباح مع زرار الإظهار */
        .profit-box { background: var(--card); margin: 10px 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--main); text-align: center; position: relative; }
        .toggle-btn { background: var(--main); color: #000; border: none; padding: 5px 15px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: 8px; }
        
        .tabs { display: flex; gap: 5px; padding: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: white; border-radius: 10px; font-weight: bold; font-family: 'Cairo'; cursor: pointer; }
        .tab-btn.active { background: var(--main); color: #000; }
        
        .container { padding: 0 15px; }
        .content { display: none; }
        .content.active { display: block; }
        
        .input-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 6px 0; background: #2d3436; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; outline: none; }
        
        .calc-row { display: flex; gap: 10px; }
        .add-btn { width: 100%; padding: 14px; background: var(--main); border: none; border-radius: 8px; font-weight: bold; font-size: 16px; font-family: 'Cairo'; cursor: pointer; margin-top: 5px; }
        
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { background: #222; padding: 10px; text-align: right; color: var(--main); font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #333; font-size: 12px; }
        
        .status { padding: 4px 7px; border-radius: 5px; font-size: 10px; background: #333; cursor: pointer; }
        .done { background: var(--success); color: white; }
        .rem-tag { color: var(--danger); font-weight: bold; cursor: pointer; border: 1px dashed var(--danger); padding: 2px 4px; border-radius: 4px; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: #161d24; text-align: center; padding: 12px 0; border-top: 1px solid #333; }
    </style>
</head>
<body onload="loadData()">

<header>
    <h2 style="margin:0; color:var(--main);">NAMBAR 1</h2>
    <div style="font-size: 11px; color: #888;">أصل الصيانة - م/ وليد فضيل</div>
</header>

<div class="stats-bar">
    <div>الدرج: <span id="cashInDrawer" style="color:var(--success)">0</span></div>
    <div>العمليات: <span id="totalOps">0</span></div>
</div>

<div class="profit-box">
    <div style="font-weight: bold; margin-bottom: 5px;">صافي الأرباح 💸</div>
    <div id="totalProfitValue" style="font-size: 24px; color: var(--success); font-weight: bold;">****</div>
    <button id="toggleBtn" class="toggle-btn" onclick="toggleProfit()">عرض الأرباح</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'mTab')">صيانة</button>
    <button class="tab-btn" onclick="switchTab(event, 'sTab')">سوفت وير</button>
    <button class="tab-btn" onclick="switchTab(event, 'aTab')">اكسسوارات</button>
</div>

<div class="container">
    <div id="mTab" class="content active">
        <div class="input-card">
            <input type="text" id="mCust" placeholder="اسم العميل">
            <input type="text" id="mDev" placeholder="الجهاز والعطل">
            <input type="number" id="mCost" placeholder="تكلفة قطعة الغيار">
            <input type="number" id="mPrice" oninput="calcM()" placeholder="إجمالي الحساب">
            <div class="calc-row">
                <input type="number" id="mPaid" oninput="calcM()" placeholder="الواصل الآن">
                <input type="number" id="mRem" placeholder="الباقي" readonly style="background:#111; color:var(--danger)">
            </div>
            <button class="add-btn" onclick="saveData('m')">حفظ العملية ✅</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>العميل</th><th>الجهاز</th><th>الحساب</th><th>الحالة</th><th>🗑️</th></tr></thead>
                <tbody id="mBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sTab" class="content">
        <div class="input-card">
            <input type="text" id="sCust" placeholder="العميل"><input type="text" id="sOp" placeholder="العملية"><input type="number" id="sPrice" placeholder="السعر">
            <button class="add-btn" style="background:#3498db" onclick="saveData('s')">حفظ سوفت 💻</button>
        </div>
        <div class="table-container"><table id="sTable"><thead><tr><th>العميل</th><th>الخدمة</th><th>السعر</th><th>🗑️</th></tr></thead><tbody id="sBody"></tbody></table></div>
    </div>

    <div id="aTab" class="content">
        <div class="input-card">
            <input type="text" id="aItem" placeholder="الصنف"><input type="number" id="aCost" placeholder="سعر الجملة"><input type="number" id="aPrice" placeholder="سعر البيع">
            <button class="add-btn" style="background:#05c46b" onclick="saveData('a')">تسجيل بيع 💰</button>
        </div>
        <div class="table-container"><table id="aTable"><thead><tr><th>الصنف</th><th>السعر</th><th>🗑️</th></tr></thead><tbody id="aBody"></tbody></table></div>
    </div>
</div>

<footer>
    <div style="color:var(--main); font-weight:bold;">M/Youssef Mohammed</div>
    <div style="color:#888; font-size:12px;">01018240374</div>
</footer>

<script>
    const DB_KEY = 'n1_safe_v9';
    let isVisible = false; // حالة الأرباح (مخفية)
    let currentProfit = 0;

    function toggleProfit() {
        const pValue = document.getElementById('totalProfitValue');
        const btn = document.getElementById('toggleBtn');
        isVisible = !isVisible;
        
        if(isVisible) {
            pValue.innerText = currentProfit.toLocaleString() + " ج.م";
            btn.innerText = "إخفاء الأرباح";
        } else {
            pValue.innerText = "****";
            btn.innerText = "عرض الأرباح";
        }
    }

    function calcM() {
        const price = parseFloat(document.getElementById('mPrice').value) || 0;
        const paid = parseFloat(document.getElementById('mPaid').value) || 0;
        document.getElementById('mRem').value = price - paid;
    }

    function switchTab(evt, name) {
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function saveData(type) {
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || { m: [], s: [], a: [] };
        const date = new Date().toLocaleDateString('ar-EG');

        if(type === 'm') {
            const p = parseFloat(document.getElementById('mPrice').value) || 0;
            const c = parseFloat(document.getElementById('mCost').value) || 0;
            const paid = parseFloat(document.getElementById('mPaid').value) || 0;
            db.m.push({ name: document.getElementById('mCust').value, dev: document.getElementById('mDev').value, price: p, cost: c, paid: paid, rem: p - paid, status: (p-paid===0)?'تم ✅':'تصليح ⏳', date: date });
        } else if(type === 's') {
            const p = parseFloat(document.getElementById('sPrice').value) || 0;
            db.s.push({ name: document.getElementById('sCust').value, op: document.getElementById('sOp').value, price: p, date: date });
        } else if(type === 'a') {
            const p = parseFloat(document.getElementById('aPrice').value) || 0;
            const c = parseFloat(document.getElementById('aCost').value) || 0;
            db.a.push({ item: document.getElementById('aItem').value, price: p, cost: c, date: date });
        }
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        loadData();
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    function settle(idx) {
        let db = JSON.parse(localStorage.getItem(DB_KEY));
        let item = db.m[idx];
        if(item.rem > 0) {
            if(confirm(`استلمت باقي الحساب (${item.rem} ج.م)؟`)) {
                item.paid += item.rem;
                item.rem = 0;
                item.status = 'تم ✅';
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                loadData();
            }
        }
    }

    function loadData() {
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || { m: [], s: [], a: [] };
        let drawer = 0; 
        currentProfit = 0; // تصفير الربح لإعادة الحساب

        // تفريغ الجداول قبل التحميل
        document.getElementById('mBody').innerHTML = '';
        document.getElementById('sBody').innerHTML = '';
        document.getElementById('aBody').innerHTML = '';

        // صيانة
        db.m.forEach((i, idx) => {
            document.getElementById('mBody').innerHTML += `<tr>
                <td>${i.name}<br><small>${i.date}</small></td>
                <td>${i.dev}</td>
                <td>
                    <b>${i.price}</b><br>
                    <small style="color:var(--success)">كاش: ${i.paid}</small><br>
                    ${i.rem > 0 ? `<span class="rem-tag" onclick="settle(${idx})">باقي: ${i.rem}</span>` : '<small style="color:var(--success)">خالص</small>'}
                </td>
                <td><span class="status ${i.status.includes('تم')?'done':''}" onclick="toggleS(${idx})">${i.status}</span></td>
                <td><button onclick="del('m',${idx})" style="background:none; border:none; color:var(--danger)">🗑️</button></td>
            </tr>`;
            drawer += i.paid;
            currentProfit += (i.paid - i.cost);
        });

        // سوفت
        db.s.forEach((i, idx) => {
            document.getElementById('sBody').innerHTML += `<tr><td>${i.name}</td><td>${i.op}</td><td>${i.price}</td><td><button onclick="del('s',${idx})" style="background:none; border:none; color:var(--danger)">🗑️</button></td></tr>`;
            drawer += i.price; currentProfit += i.price;
        });

        // اكسسوارات
        db.a.forEach((i, idx) => {
            document.getElementById('aBody').innerHTML += `<tr><td>${i.item}</td><td>${i.price}</td><td><button onclick="del('a',${idx})" style="background:none; border:none; color:var(--danger)">🗑️</button></td></tr>`;
            drawer += i.price; currentProfit += (i.price - i.cost);
        });

        document.getElementById('cashInDrawer').innerText = drawer.toLocaleString() + " ج.م";
        document.getElementById('totalOps').innerText = db.m.length + db.s.length + db.a.length;
        
        // تحديث الرقم في الخلفية لكن لا يظهر إلا لوisVisible True
        if(isVisible) {
            document.getElementById('totalProfitValue').innerText = currentProfit.toLocaleString() + " ج.م";
        }
    }

    function toggleS(idx) {
        let db = JSON.parse(localStorage.getItem(DB_KEY));
        db.m[idx].status = db.m[idx].status.includes('تم') ? 'تصليح ⏳' : 'تم ✅';
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        loadData();
    }

    function del(t, idx) {
        if(confirm("حذف؟")) {
            let db = JSON.parse(localStorage.getItem(DB_KEY));
            db[t].splice(idx, 1);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            loadData();
        }
    }
</script>
</body>
</html>
