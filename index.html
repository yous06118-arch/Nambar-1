<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nambar 1 - Software by M/Youssef</title>
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/00d2d3/000000?text=N1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root {
            --main: #00d2d3; /* لون لبني عصري */
            --bg: #0a0e12;
            --card: #161d24;
            --text: #ffffff;
            --danger: #ff4757;
            --success: #05c46b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- شاشة الترحيب (Splash Screen) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: 0.6s ease-in-out;
        }

        .splash-logo {
            font-size: 3.5rem;
            color: var(--main);
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 210, 211, 0.5);
            animation: pulse 1.5s infinite;
        }

        .dev-tag { color: #555; font-size: 14px; margin-top: 10px; font-weight: bold; letter-spacing: 2px; }

        .loader {
            width: 45px; height: 45px;
            border: 4px solid #111;
            border-top: 4px solid var(--main);
            border-radius: 50%;
            margin-top: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }

        /* --- الواجهة الرئيسية --- */
        header {
            background: var(--card);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stats-bar {
            background: #1e272e;
            padding: 15px;
            text-align: center;
            color: var(--main);
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }

        .tabs { display: flex; gap: 8px; padding: 15px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: #222;
            color: white; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-family: 'Cairo'; transition: 0.3s;
        }
        .tab-btn.active { background: var(--main); color: #000; box-shadow: 0 0 10px var(--main); }

        .container { padding: 0 15px; }
        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #2d3436; border: 1px solid #444;
            color: white; border-radius: 8px; box-sizing: border-box;
            font-family: 'Cairo'; outline: none;
        }

        .add-btn {
            width: 100%; padding: 15px; background: var(--main);
            border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; color: #000; font-size: 16px; margin-top: 10px;
            font-family: 'Cairo';
        }

        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #222; padding: 12px; text-align: right; color: var(--main); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; }

        .status { cursor: pointer; padding: 5px 10px; border-radius: 6px; font-size: 11px; background: #333; font-weight: bold; }
        .done { background: var(--success); color: white; }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }

        footer {
            position: fixed; bottom: 0; width: 100%;
            background: #161d24; color: #777; text-align: center;
            padding: 15px 0; border-top: 1px solid #333; font-size: 14px; z-index: 100;
        }
        .dev-name { color: var(--main); font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div id="splash-screen">
    <div class="splash-logo">NAMBAR 1</div>
    <div class="dev-tag">DESIGNED BY M/YOUSSEF</div>
    <div class="loader"></div>
</div>

<header>
    <h2 style="margin:0; color:var(--main); letter-spacing: 2px;">NAMBAR 1</h2>
    <div style="font-size: 12px; color: #888; margin-top: 5px;">أصل الصيانة - م/ وليد فضيل</div>
</header>

<div class="stats-bar">
    <div>إجمالي الدخل: <span id="totalMoney" style="color:var(--success)">0</span> ج.م</div>
    <div>العمليات: <span id="totalOps">0</span></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'mTab')">قسم الصيانة</button>
    <button class="tab-btn" onclick="switchTab(event, 'aTab')">الاكسسوارات</button>
</div>

<div class="container">
    <div id="mTab" class="content active">
        <div class="input-card">
            <input type="text" id="mCust" placeholder="اسم العميل">
            <input type="text" id="mDev" placeholder="نوع الجهاز والعطل">
            <input type="number" id="mPrice" placeholder="تكلفة الصيانة">
            <button class="add-btn" onclick="saveData('m')">حفظ في السجل ✅</button>
        </div>
        <div class="table-container">
            <table id="mTable">
                <thead><tr><th>العميل</th><th>الجهاز</th><th>السعر</th><th>الحالة</th><th>🗑️</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="aTab" class="content">
        <div class="input-card">
            <input type="text" id="aItem" placeholder="الصنف (شاحن، سماعة...)">
            <input type="number" id="aPrice" placeholder="سعر البيع">
            <button class="add-btn" style="background:#00d2d3" onclick="saveData('a')">تسجيل عملية بيع 💰</button>
        </div>
        <div class="table-container">
            <table id="aTable">
                <thead><tr><th>الصنف</th><th>السعر</th><th>الوقت</th><th>🗑️</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    Designed & Developed by <span class="dev-name">M/Youssef</span> © 2026
</footer>

<script>
    // تشغيل شاشة الترحيب
    function initApp() {
        loadData();
        setTimeout(() => {
            const ss = document.getElementById('splash-screen');
            ss.style.opacity = '0';
            setTimeout(() => { ss.style.display = 'none'; }, 600);
        }, 3000); 
    }

    // تبديل التبويبات
    function switchTab(evt, name) {
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // حفظ البيانات في LocalStorage
    function saveData(type) {
        let db = JSON.parse(localStorage.getItem('nambar1_youssef_db')) || { m: [], a: [] };
        const time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});

        if(type === 'm') {
            const name = document.getElementById('mCust').value;
            const price = document.getElementById('mPrice').value;
            if(!name || !price) return alert("برجاء إدخال البيانات كاملة");
            db.m.push({ name, dev: document.getElementById('mDev').value, price: parseFloat(price), status: 'قيد التصليح ⏳' });
        } else {
            const item = document.getElementById('aItem').value;
            const price = document.getElementById('aPrice').value;
            if(!item || !price) return alert("برجاء إدخال الصنف والسعر");
            db.a.push({ item, price: parseFloat(price), time });
        }

        localStorage.setItem('nambar1_youssef_db', JSON.stringify(db));
        loadData();
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    // تحميل وعرض البيانات
    function loadData() {
        let db = JSON.parse(localStorage.getItem('nambar1_youssef_db')) || { m: [], a: [] };
        let total = 0;

        // جدول الصيانة
        let mBody = document.querySelector("#mTable tbody");
        mBody.innerHTML = '';
        db.m.forEach((i, idx) => {
            let isDone = i.status.includes('تم') ? 'done' : '';
            mBody.innerHTML += `<tr>
                <td>${i.name}</td><td>${i.dev}</td><td style="color:var(--main)">${i.price}</td>
                <td><span class="status ${isDone}" onclick="toggleStatus(${idx})">${i.status}</span></td>
                <td><button class="delete-btn" onclick="deleteItem('m', ${idx})">🗑️</button></td>
            </tr>`;
            total += i.price;
        });

        // جدول الاكسسوارات
        let aBody = document.querySelector("#aTable tbody");
        aBody.innerHTML = '';
        db.a.forEach((i, idx) => {
            aBody.innerHTML += `<tr>
                <td>${i.item}</td><td style="color:var(--main)">${i.price}</td><td>${i.time}</td>
                <td><button class="delete-btn" onclick="deleteItem('a', ${idx})">🗑️</button></td>
            </tr>`;
            total += i.price;
        });

        document.getElementById('totalMoney').innerText = total.toLocaleString();
        document.getElementById('totalOps').innerText = db.m.length + db.a.length;
    }

    // تغيير حالة الجهاز
    function toggleStatus(idx) {
        let db = JSON.parse(localStorage.getItem('nambar1_youssef_db'));
        db.m[idx].status = db.m[idx].status.includes('تم') ? 'قيد التصليح ⏳' : 'تم التسليم ✅';
        localStorage.setItem('nambar1_youssef_db', JSON.stringify(db));
        loadData();
    }

    // حذف عملية
    function deleteItem(type, index) {
        if(confirm("هل تريد حذف هذه العملية نهائياً؟")) {
            let db = JSON.parse(localStorage.getItem('nambar1_youssef_db'));
            if(type === 'm') db.m.splice(index, 1);
            else db.a.splice(index, 1);
            localStorage.setItem('nambar1_youssef_db', JSON.stringify(db));
            loadData();
        }
    }
</script>
</body>
</html>
